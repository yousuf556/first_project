    <!-- CENTER -->

        <a href="about_me.html"><button>About Me</button></a>
        <a href="contact.html"><button>Contact</button></a>
        <a href="index.html"><button>Back</button></a>
    </div>

    <!-- RIGHT -->
    <div class="icon_space">

        <div class="search_box">
            <img class="icons" src="search_bar.png">
            <input type="text" placeholder="Search">
        </div>
        <!-- SETTINGS -->
        <div class="settings">
            <img class="icons" src="settings.png">

            <div class="settings_panel">

                <!-- MUSIC -->
                <div class="setting_row">
                    <span>Music</span>
                    <span class="arrow">▶</span>

                    <div class="sub_panel">

                <!-- TEMPERATURE -->
                <div class="setting_row">
                    <span>Temperature</span>

                    </div>
                </div>

            </div>
        </div>

    </div>

</header>

<!-- SIMPLE TIC TAC TOE SCRIPT -->
<script>
let grid=["","","","","","","","",""];  // 3x3 grid represented as a flat array
let turn = "X";   // X starts first
let gameOver = false;

function play(box,index) {

    // stop if box already clicked
    if (box.innerHTML !== "" || gameOver) {
        return;
    }

    grid[index]=turn;

    // place X or O
    if (turn === "X") {
        box.innerHTML = "<img class='game_icon' src='cross.png'>";
        turn = "O";
    } else {
        box.innerHTML = "<img class='game_icon' src='circle.png'>";
        turn = "X";
    }
    checkWin();

}
function checkWin() {
    const winPatterns = [
        [0,1,2], [3,4,5], [6,7,8], // rows
        [0,3,6], [1,4,7], [2,5,8], // columns
        [0,4,8], [2,4,6]           // diagonals
    ];

    for(let pattern of winPatterns){

        let a = pattern[0];
        let b = pattern[1];
        let c = pattern[2];

        if(
            grid[a] !== "" &&
            grid[a] === grid[b] &&
            grid[a] === grid[c]

        )

        {
            alert(grid[a]+"wins!");
            gameOver=true;
            return;

        }
    }
    //check draw
    if(!grid.includes("")){
        alert("its adraw!");
        gameOver=true

    }
    
}
function restartGame() {

grid = ["","","","","","","","",""]; 
turn = "X"; 
gameOver = false;

let boxes = document.getElementsByClassName("ticktackbox");

for (let i = 0; i < boxes.length; i++) {
    boxes[i].innerHTML = ""; 
}
}


</script>

<!-- GAME GRID -->
<div class="game_section">

    <button onclick="restartGame()">Restart</button>

    <div class="row">
        <div class="ticktackbox" onclick="play(this,0)"></div>
        <div class="ticktackbox" onclick="play(this,1)"></div>
        <div class="ticktackbox" onclick="play(this,2)"></div>
    </div>

    <div class="row">
        <div class="ticktackbox" onclick="play(this,3)"></div>
        <div class="ticktackbox" onclick="play(this,4)"></div>
        <div class="ticktackbox" onclick="play(this,5)"></div>
    </div>

    <div class="row">
        <div class="ticktackbox" onclick="play(this,6)"></div>
        <div class="ticktackbox" onclick="play(this,7)"></div>
        <div class="ticktackbox" onclick="play(this,8)"></div>
    </div>

</div>

</body>
